<html>
<head>
  <meta charset="utf-8">

</head>

<div class="header">

  <a href="index.html">Homepage</a> / <a href="seller.html">Seller</a> / Register
</div>

<div class="container">

<h1>Register Account</h1>

<div class="form-box">

  <p>Name (English letters only)</p>
  <input type="text" id="name" placeholder="your name">

  <p>Address (English letters + numbers)</p>
  <input type="text" id="address" placeholder="your address">

  <p>Phone Number</p>
  <input type="text" id="phone" placeholder="13xxxxxxxxx">

  <p>Email</p>
  <input type="text" id="email" placeholder="name@example.com">

  <p>Username</p>
  <input type="text" id="username" placeholder="username">

  <p>Password</p>
  <input type="password" id="password" placeholder="password">

  <br>
  <button onclick="register()">Register</button>

</div>

</div>

<div class="footer">
  &copy; 2026 [Company Name]. All rights reserved
</div>

<script src="js/util.js"></script>

<script>
  function register() {
    var name = document.getElementById('name').value;
    var address = document.getElementById('address').value;
    var phone = document.getElementById('phone').value;
    var email = document.getElementById('email').value;
    var username = document.getElementById('username').value;
    var password = document.getElementById('password').value;

    if (name == '') {
      alert('Please enter your name');
      return;
    }

    if (!/^[A-Za-z\s]+$/.test(name)) {
      alert('Name can only contain English letters and spaces');
      return;
    }

    if (address == '') {
      alert('Please enter your address');
      return;
    }

    if (!/^[A-Za-z0-9\s]+$/.test(address)) {
      alert('Address can only contain English letters, numbers and spaces');
      return;
    }

    if (phone == '') {
      alert('Please enter your phone number');
      return;
    }

    if (!/^1[3-9]\d{9}$/.test(phone)) {
      alert('Phone number must be 11 digits starting with 1');
      return;
    }

    if (email == '') {
      alert('Please enter your email');
      return;
    }

    if (email.indexOf('@') == -1) {
      alert('Email must have @');
      return;
    }

    if (email.indexOf('@') != email.lastIndexOf('@')) {
      alert('Email can only have one @');
      return;
    }

    if (!email.endsWith('.com') && !email.endsWith('.cn')) {
      alert('Email must end with .com or .cn');
      return;
    }

    if (username == '') {
      alert('Please enter username');
      return;
    }

    if (username.length < 6) {
      alert('Username must be at least 6 characters');
      return;
    }

    if (password == '') {
      alert('Please enter password');
      return;
    }

    if (password.length < 6) {
      alert('Password must be at least 6 characters');
      return;
    }

    if (userExists(username)) {
      alert('Username already exists');
      return;
    }

    saveUser({
      name: name,
      address: address,
      phone: phone,
      email: email,
      username: username,
      password: password
    });

    alert('Registration successful, please login');

    location.href = 'login.html';
  }

  var user = getCurrentUser();
  if (user) {
    document.getElementById('user-info').innerHTML = 'Logged in: ' + user.username + ' | <a href="#" onclick="logoutUser(); location.href=\'index.html\';">Logout</a>';
  } else {
    document.getElementById('user-info').innerHTML = '<a href="login.html">Login</a> | <a href="register.html">Register</a>';
  }
</script>

</body>
</html>
